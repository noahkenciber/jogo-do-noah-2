<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo do Noah 2 | Infinite Runner</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Outfit:wght@300;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div id="game-container">
        <!-- HUD Superior -->
        <div id="hud">
            <div id="score-container">
                <span class="label">PONTOS</span>
                <span id="score-value">0</span>
            </div>
            <div id="coins-container">
                <span class="label">🪙</span>
                <span id="coins-value">0</span>
            </div>
        </div>

        <!-- Canvas do Jogo -->
        <canvas id="game-canvas"></canvas>

        <!-- Overlay de Menu Inicial -->
        <div id="start-screen" class="overlay active">
            <div class="content">
                <h1>JOGO DO NOAH 2</h1>
                <p>O MAIOR RUNNER DE TODOS OS TEMPOS</p>
                <button id="start-button">INICIAR CORRIDA</button>
                <div class="controls-hint">
                    <span>Espaço / ↑ para Pular</span>
                    <span>↓ para Abaixar</span>
                    <span>← → para Desviar</span>
                </div>
            </div>
        </div>

        <!-- Overlay de Game Over -->
        <div id="game-over-screen" class="overlay">
            <div class="content">
                <h1 class="critical">FIM DE JOGO!</h1>
                <div class="stats">
                    <div class="stat-item">
                        <span class="label">Pontuação:</span>
                        <span id="final-score">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="label">Recorde:</span>
                        <span id="high-score">0</span>
                    </div>
                </div>
                <button id="restart-button">TENTAR NOVAMENTE</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script type="module" src="src/main.js"></script>
</body>
</html>
