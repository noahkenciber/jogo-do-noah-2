<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo do Noah 2 | 3D Reality Runner</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>
</head>
<body>
    <div id="game-container">
        <!-- HUD -->
        <div id="hud">
            <div class="hud-item">
                <span class="label">PONTOS</span>
                <span id="score-value">0</span>
            </div>
            <div class="hud-item">
                <span class="label">COLETADOS</span>
                <span id="coins-value">0</span>
            </div>
        </div>

        <!-- Overlays -->
        <div id="start-screen" class="overlay active">
            <div class="content">
                <h1 class="logo">NOAH <span class="accent">3D</span></h1>
                <p>O PODER DA REALIDADE</p>
                <button id="start-button">INICIAR CORRIDA</button>
                <div class="controls-hint">ESPAÇO para pular • SETAS para mover</div>
            </div>
        </div>

        <div id="game-over-screen" class="overlay">
            <div class="content">
                <h1 class="critical">FIM DE JOGO</h1>
                <div class="stats">
                    <span id="final-score">0</span>
                    <span class="label">SCORE TOTAL</span>
                </div>
                <button id="restart-button">RECOMEÇAR</button>
            </div>
        </div>
    </div>

    <!-- O Canvas será gerado pelo Three.js -->
    <script type="module" src="src/main.js"></script>
</body>
</html>
