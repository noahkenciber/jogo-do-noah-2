<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo do Noah 2 | 3D Reality Runner</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    <!-- Three.js Global Build -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="game-container">
        <!-- HUD -->
        <div id="hud">
            <div class="hud-item">
                <span class="label">PONTOS</span>
                <span id="score-value">0</span>
            </div>
            <div class="hud-item">
                <span class="label">COLETADOS</span>
                <span id="coins-value">0</span>
            </div>
        </div>

        <!-- Overlays -->
        <div id="start-screen" class="overlay active">
            <div class="content">
                <h1 class="logo">NOAH <span class="accent">3D</span></h1>
                <p>O PODER DA REALIDADE</p>
                <button id="start-button">INICIAR CORRIDA</button>
                <div class="controls-hint">A e D para mover</div>
            </div>
        </div>

        <div id="game-over-screen" class="overlay">
            <div class="content">
                <h1 class="critical">FIM DE JOGO</h1>
                <div class="stats">
                    <span id="final-score">0</span>
                    <span class="label">SCORE TOTAL</span>
                </div>
                <button id="restart-button">RECOMEÇAR</button>
            </div>
        </div>
    </div>

    <!-- O Código do Jogo 3D Real -->
    <script>
        (function() {
            class Game {
                constructor() {
                    console.log("🛠️ Inicializando Versão Shrek 3D...");
                    this.score = 0;
                    this.isPlaying = false;

                    // Cena 3D
                    this.scene = new THREE.Scene();
                    
                    // Carregar Fundo (Shrek)
                    const loader = new THREE.TextureLoader();
                    loader.load('assets/fundo_shrek.jpg', (texture) => {
                        this.scene.background = texture;
                        console.log("🖼️ Shrek carregado!");
                    });

                    this.scene.fog = new THREE.Fog(0x000000, 20, 100);

                    this.camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                    this.camera.position.set(0, 4, 10);
                    this.camera.lookAt(0, 2, 0);

                    this.renderer = new THREE.WebGLRenderer({ antialias: true });
                    this.renderer.setSize(window.innerWidth, window.innerHeight);
                    this.renderer.shadowMap.enabled = true;
                    document.getElementById('game-container').appendChild(this.renderer.domElement);

                    // Luz
                    this.scene.add(new THREE.AmbientLight(0xffffff, 0.8));
                    const sun = new THREE.DirectionalLight(0xffffff, 1);
                    sun.position.set(5, 15, 5);
                    sun.castShadow = true;
                    this.scene.add(sun);

                    // Pista
                    const ground = new THREE.Mesh(
                        new THREE.PlaneGeometry(30, 2000),
                        new THREE.MeshStandardMaterial({ color: 0x111111 })
                    );
                    ground.rotation.x = -Math.PI / 2;
                    ground.receiveShadow = true;
                    this.scene.add(ground);

                    // Boneco TODO PRETO
                    this.player = new THREE.Mesh(
                        new THREE.BoxGeometry(1.2, 2.2, 1.2),
                        new THREE.MeshStandardMaterial({ color: 0x000000 })
                    );
                    this.player.position.y = 1.1;
                    this.player.castShadow = true;
                    this.scene.add(this.player);

                    this.playerLane = 0;
                    this.obstacles = [];
                    this.spawnTimer = 0;

                    this.init();
                }

                init() {
                    const btn = document.getElementById('start-button');
                    const rbtn = document.getElementById('restart-button');
                    
                    const startFunc = () => {
                        this.isPlaying = true;
                        this.score = 0;
                        this.playerLane = 0;
                        this.player.position.set(0, 1.1, 0);
                        this.obstacles.forEach(o => this.scene.remove(o));
                        this.obstacles = [];
                        document.getElementById('start-screen').classList.remove('active');
                        document.getElementById('game-over-screen').classList.remove('active');
                    };

                    if(btn) btn.onclick = startFunc;
                    if(rbtn) rbtn.onclick = startFunc;

                    window.addEventListener('keydown', (e) => {
                        if (!this.isPlaying) { if(e.key === ' ' || e.key === 'Enter') startFunc(); return; }
                        
                        // Controles Noah: A para Esquerda (-), D para Direita (+)
                        if ((e.key === 'a' || e.key === 'A') && this.playerLane > -1) this.playerLane--;
                        if ((e.key === 'd' || e.key === 'D') && this.playerLane < 1) this.playerLane++;
                    });

                    this.animate();
                }

                spawn() {
                    const lane = Math.floor(Math.random() * 3) - 1;
                    const h = Math.random() * 2 + 1;
                    const obs = new THREE.Mesh(
                        new THREE.BoxGeometry(2, h, 1),
                        new THREE.MeshStandardMaterial({ color: 0x333333 })
                    );
                    obs.position.set(lane * 4, h/2, -100);
                    obs.castShadow = true;
                    this.scene.add(obs);
                    this.obstacles.push(obs);
                }

                update() {
                    if (!this.isPlaying) return;
                    this.score += 0.1;
                    document.getElementById('score-value').innerText = Math.floor(this.score);

                    this.player.position.x += (this.playerLane * 4 - this.player.position.x) * 0.15;

                    if (++this.spawnTimer > 60) { this.spawn(); this.spawnTimer = 0; }

                    const speed = 0.8 + (this.score * 0.0001);
                    for (let i = this.obstacles.length - 1; i >= 0; i--) {
                        const o = this.obstacles[i];
                        o.position.z += speed;
                        
                        const pBox = new THREE.Box3().setFromObject(this.player);
                        const oBox = new THREE.Box3().setFromObject(o);
                        if (pBox.intersectsBox(oBox)) {
                            this.isPlaying = false;
                            document.getElementById('final-score').innerText = Math.floor(this.score);
                            document.getElementById('game-over-screen').classList.add('active');
                        }
                        if (o.position.z > 20) { this.scene.remove(o); this.obstacles.splice(i, 1); }
                    }
                }

                animate() {
                    requestAnimationFrame(() => this.animate());
                    this.update();
                    this.renderer.render(this.scene, this.camera);
                }
            }
            window.onload = () => { new Game(); };
        })();
    </script>
</body>
</html>
